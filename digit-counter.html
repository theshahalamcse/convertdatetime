<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digit Increment</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #C2E9EB;
            font-family: 'Arial', sans-serif;
        }

        .counter-container {
            text-align: center;
            color: black;
            background: #C2E9EB;
            backdrop-filter: blur(10px);
            padding: 60px 80px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        #digit {
            font-size: 120px;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            transition: transform 0.1s;
        }

        #digit:active {
            transform: scale(0.95);
        }

        button {
            font-size: 24px;
            padding: 15px 40px;
            background: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            background-color: rgb(170, 243, 188);
        }

        button:active {
            transform: translateY(0);
        }

        .label {
            font-size: 18px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="counter-container">
        <div class="label">আস্তাগফিরুল্লা উচ্চারণ করুন</div>
        <div id="digit">Result</div>
        <button onclick="increment()">Click Me</button>
    </div>

    <script>
        let count = 995;

        function increment() {
            count++;
            document.getElementById('digit').textContent = count;
            
            if (count === 1000) {
                setTimeout(() => {
                    alert('🎉 Congratulations! You reached 1000! 🎉');
                    count = 0;
                    document.getElementById('digit').textContent = count;
                }, 80);
            }
        }
    </script>
</body>
</html>
