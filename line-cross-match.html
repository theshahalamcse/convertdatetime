<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Exact Word Match</title>
<style>
* { box-sizing: border-box; }
body { font-family: Arial, sans-serif; margin:0; padding:20px; background:#f3f4f6; color:#1f2937; }
h2 { text-align:center; margin-bottom:20px; }
.container { display:flex; flex-direction:column; gap:15px; }
.panel { display:flex; flex-direction:column; gap:8px; }
label { font-weight:600; }
textarea { width:100%; min-height:200px; padding:12px; border-radius:8px; border:1px solid #cbd5e1; font-size:14px; resize:vertical; }
textarea:focus { outline:none; border-color:#3b82f6; box-shadow:0 0 5px rgba(59,130,246,0.3); }
.controls { display:flex; justify-content:space-between; align-items:center; margin-top:5px; }
.btn { padding:8px 12px; border-radius:6px; border:none; background:#2563eb; color:white; cursor:pointer; font-weight:600; }
.badge { background:#e0f2fe; color:#0369a1; padding:5px 10px; border-radius:999px; font-weight:600; }
.toast { position:fixed; bottom:20px; right:20px; padding:10px 14px; background:#111827; color:white; border-radius:8px; opacity:0; transform:translateY(8px); transition:opacity .2s, transform .2s; }
.toast.show { opacity:1; transform:translateY(0); }
@media(min-width:768px){ .container { flex-direction:row; } .panel{ width:32%; } }
</style>
</head>
<body>

<h2>Live Exact Word Match</h2>

<div class="container">
  <div class="panel">
    <label for="left">Left Input (Main Text)</label>
    <textarea id="left" placeholder="Enter your main lines here"></textarea>
  </div>

  <div class="panel">
    <label for="middle">Middle Input (Words to Match)</label>
    <textarea id="middle" placeholder="Enter words, one per line"></textarea>
  </div>

  <div class="panel">
    <label for="right">Right Output (Matched Lines)</label>
    <textarea id="right" readonly placeholder="Matched lines will appear here"></textarea>
    <div class="controls">
      <div class="badge" id="count">Matched: 0</div>
      <button class="btn" id="copyBtn">Copy Output</button>
    </div>
  </div>
</div>

<div id="toast" class="toast">Copied!</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
  const left = document.getElementById("left");
  const middle = document.getElementById("middle");
  const right = document.getElementById("right");
  const countBadge = document.getElementById("count");
  const copyBtn = document.getElementById("copyBtn");
  const toast = document.getElementById("toast");

  function cleanWord(word){
    // remove punctuation and trim
    return word.replace(/[^\w]/g,'').toLowerCase().trim();
  }

  function crossMatch() {
    const leftLines = left.value.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
    const words = middle.value.split(/\r?\n/).map(cleanWord).filter(Boolean);

    if (!leftLines.length || !words.length) {
      right.value = "";
      countBadge.textContent = "Matched: 0";
      return;
    }

    const matched = leftLines.filter(line => {
      const lineWords = line.split(/\s+/).map(cleanWord).filter(Boolean);
      return words.some(w => lineWords.includes(w));
    });

    right.value = matched.join("\n");
    countBadge.textContent = `Matched: ${matched.length}`;
  }

  left.addEventListener("input", crossMatch);
  middle.addEventListener("input", crossMatch);

  copyBtn.addEventListener("click", async () => {
    try {
      await navigator.clipboard.writeText(right.value);
      showToast("Copied!");
    } catch {
      right.select();
      document.execCommand("copy");
      showToast("Copied!");
    }
  });

  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(()=>toast.classList.remove("show"), 1500);
  }

  crossMatch(); // initial run
});
</script>

</body>
</html>
