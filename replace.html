<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PON Name Replacement With ID (Responsive)</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f7f7f7;
    padding: 20px;
    margin: 0;
  }

  h2 {
    text-align: center;
    color: #333;
    margin-bottom: 20px;
  }

  .container {
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 15px;
  }

  .box {
    flex: 1;
    min-width: 280px;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  label {
    font-weight: bold;
    margin-bottom: 5px;
  }

  textarea {
    width: 100%;
    height: 280px;
    resize: none;
    font-family: monospace;
    font-size: 14px;
    border-radius: 8px;
    border: 1px solid #ccc;
    padding: 10px;
    background: #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    transition: all 0.2s ease-in-out;
  }

  textarea:focus {
    outline: none;
    border-color: #007bff;
    box-shadow: 0 0 6px rgba(0,123,255,0.3);
  }

  button.copy-btn, button.unique-btn {
    position: absolute;
    top: 8px;
    right: 10px;
    background: #007bff;
    color: white;
    border: none;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.2s;
  }

  button.copy-btn:hover {
    background: #0056b3;
  }

  button.unique-btn {
    background: #28a745;
    left: 10px;
    right: auto;
  }

  button.unique-btn:hover {
    background: #1e7e34;
  }

  .unique-section {
    margin-top: 25px;
  }

  @media (max-width: 900px) {
    .container {
      flex-direction: column;
    }
    textarea {
      height: 220px;
    }
    button.copy-btn, button.unique-btn {
      top: 5px;
      font-size: 12px;
      padding: 4px 8px;
    }
  }
</style>
</head>
<body>

<h2>🔁 PON Name Replacement With ID (Live & Responsive)</h2>

<div class="container">
  <div class="box">
    <label>Input (PON Names)</label>
    <textarea id="inputText" placeholder="Example:
PON-A
PON-B
PON-A
PON-C"></textarea>
  </div>

  <div class="box">
    <label>Mapping (Name=ID)</label>
    <textarea id="mappingText" placeholder="Example:
PON-A=101
PON-B=102
PON-C=103"></textarea>
  </div>

  <div class="box">
    <label>Output (Converted IDs)</label>
    <button class="copy-btn" onclick="copyOutput()">Copy</button>
    <textarea id="outputText" placeholder="Result will appear here..." readonly></textarea>
  </div>
</div>

<div class="unique-section">
  <label>Unique PON Names (from Input)</label>
  <button class="unique-btn" onclick="generateUnique()">Find Unique</button>
  <textarea id="uniqueText" placeholder="Unique lines will appear here..." readonly></textarea>
</div>

<script>
function convertText() {
  const input = document.getElementById('inputText').value.trim().split(/\r?\n/);
  const mappingLines = document.getElementById('mappingText').value.trim().split(/\r?\n/);
  const outputBox = document.getElementById('outputText');

  const map = {};
  mappingLines.forEach(line => {
    const [key, val] = line.split('=');
    if (key && val) map[key.trim()] = val.trim();
  });

  const output = input.map(line => map[line.trim()] || line).join('\n');
  outputBox.value = output;
}

function generateUnique() {
  const inputBox = document.getElementById('inputText');
  const uniqueBox = document.getElementById('uniqueText');
  const lines = inputBox.value.trim().split(/\r?\n/).filter(Boolean);
  const uniqueLines = [...new Set(lines)];
  uniqueBox.value = uniqueLines.join('\n');
  alert('✅ Unique PON names extracted successfully!');
}

function copyOutput() {
  const output = document.getElementById('outputText');
  output.select();
  document.execCommand('copy');
  alert('✅ Output copied to clipboard!');
}

document.getElementById('inputText').addEventListener('input', convertText);
document.getElementById('mappingText').addEventListener('input', convertText);
</script>

</body>
</html>
